spring:
  datasource:
    url: jdbc:mysql://localhost:3306/playground_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: playground
    password: Playground@2024!
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - read:user
              - user:email

server:
  port: 8080

app:
  cors:
    allowed-origins: http://ssh.gsmsv.site:30234
