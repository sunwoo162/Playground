spring:
  datasource:
    url: jdbc:mysql://localhost:3306/playground_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: playground
    password: Playground@2024!
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - read:user
              - user:email

server:
  port: 8080

logging:
  level:
    com.playground: DEBUG

app:
  cors:
    allowed-origins: https://playground.https.gsmsv.site
  jwt:
    secret: ${JWT_SECRET:playground-jwt-secret-2024-secure-key}
  node-url: http://localhost:3000

kis:
  # 한국투자증권 Open API. 실전: https://openapi.koreainvestment.com:9443, 모의: https://openapivts.koreainvestment.com:29443
  base-url: ${KIS_BASE_URL:https://openapivts.koreainvestment.com:29443}
  app-key: ${KIS_APP_KEY:}
  app-secret: ${KIS_APP_SECRET:}
  account-no: ${KIS_ACCOUNT_NO:}
  # true면 API 키 없이 샘플 시세로 동작. 실제 한국투자증권 API를 쓰려면 false로 설정.
  mock: ${KIS_MOCK:true}
