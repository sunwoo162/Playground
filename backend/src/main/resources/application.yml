spring:
  datasource:
    url: jdbc:mysql://localhost:3306/playground_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: playground
    password: Playground@2024!
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - read:user
              - user:email

server:
  port: 8080

logging:
  level:
    com.playground: DEBUG

app:
  cors:
    allowed-origins: https://playground.https.gsmsv.site
  jwt:
    secret: ${JWT_SECRET:playground-jwt-secret-2024-secure-key}
  node-url: http://localhost:3000

twelve-data:
  base-url: ${TWELVE_DATA_BASE_URL:https://api.twelvedata.com}
  api-key: ${TWELVE_DATA_API_KEY:}
  # true면 API 키 없이 샘플 시세로 동작. 실제 Twelve Data를 쓰려면 false로 설정.
  mock: ${TWELVE_DATA_MOCK:false}
