<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>모의 투자 관심 종목</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <div>
          <h1>모의 투자</h1>
          <p>보유 · 관심 종목</p>
        </div>
        <div class="header-actions">
          <button id="openAppButton" type="button" title="놀이터로 이동">놀이터</button>
          <button id="refreshButton" type="button" title="새로고침">새로고침</button>
        </div>
      </header>

      <section id="status" class="status">관심 종목을 불러오는 중...</section>
      <section id="watchlist" class="watchlist hidden"></section>
      <section id="emptyState" class="empty hidden">
        <strong>표시할 종목이 없습니다.</strong>
        <span>모의 투자 웹에서 관심 종목을 등록하거나 종목을 매수해주세요.</span>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
