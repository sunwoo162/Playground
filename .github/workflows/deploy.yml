name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
          cache-read-only: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/*/package-lock.json

      - name: Install frontend dependencies
        run: npm run install:all

      - name: Build frontend apps
        run: npm run build:all

      - name: Build Spring Boot JAR
        run: |
          cd backend
          gradle bootJar -x test --no-daemon
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}

      - name: Copy JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ssh.gsmsv.site
          port: 24136
          username: ubuntu
          password: ${{ secrets.SSH_PASSWORD }}
          source: "backend/build/libs/playground-backend-0.0.1-SNAPSHOT.jar"
          target: "/home/ubuntu/playground/backend/build/libs/"
          strip_components: 3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.gsmsv.site
          port: 24136
          username: ubuntu
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd ~/playground

            # 서버에서 수정된 파일(application.yml 등) 무시하고 pull
            git fetch origin main
            git reset --hard origin/main

            # 의존성 설치 및 프론트 빌드
            npm run install:all
            npm run build:all

            # playground (Node.js) 재시작 - ecosystem으로 환경변수 포함
            pm2 delete playground 2>/dev/null || true
            export $(grep -v '^#' /home/ubuntu/playground/.env | xargs)
            pm2 start ecosystem.config.js --only playground

            # backend (Spring Boot) 재시작 - 새 JAR 반영
            pm2 delete backend 2>/dev/null || true
            pm2 start ecosystem.config.js --only backend

            pm2 save
            sudo systemctl reload nginx 2>/dev/null || true

            # Notion 업데이트
            node scripts/notion-sync.js update || true
