name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew
        
      - name: Build Spring Boot JAR
        run: |
          cd backend
          ./gradlew bootJar -x test
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}

      - name: Copy JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ssh.gsmsv.site
          port: 24136
          username: ubuntu
          password: ${{ secrets.SSH_PASSWORD }}
          source: "backend/build/libs/*.jar"
          target: "~/playground/backend/build/libs/"
          strip_components: 3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.gsmsv.site
          port: 24136
          username: ubuntu
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # 프론트엔드 업데이트
            cd ~/playground
            git pull origin main
            npm install --legacy-peer-deps
            npm run build:all

            # Node 서버 재시작
            pm2 restart playground

            # Spring Boot 재시작
            pm2 describe backend > /dev/null 2>&1 \
              && pm2 restart backend \
              || pm2 start ~/playground/backend/build/libs/playground-backend-0.0.1-SNAPSHOT.jar \
                  --name backend \
                  --interpreter java \
                  --interpreter-args "-jar"
