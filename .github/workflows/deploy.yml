name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build Spring Boot JAR
        run: |
          cd backend
          gradle bootJar -x test
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}

      - name: Copy JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ssh.gsmsv.site
          port: 24136
          username: ubuntu
          password: ${{ secrets.SSH_PASSWORD }}
          source: "backend/build/libs/playground-backend-0.0.1-SNAPSHOT.jar"
          target: "/home/ubuntu/playground/backend/build/libs/"
          strip_components: 3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.gsmsv.site
          port: 24136
          username: ubuntu
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd ~/playground
            git pull origin main
            npm install --legacy-peer-deps
            npm run build:all
            pm2 restart playground

            # Spring Boot 재시작
            if pm2 describe backend > /dev/null 2>&1; then
              pm2 restart backend
            else
              pm2 start /home/ubuntu/playground/backend/build/libs/playground-backend-0.0.1-SNAPSHOT.jar \
                --name backend \
                --interpreter java \
                --interpreter-args "-jar"
            fi
            pm2 save
