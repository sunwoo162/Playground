name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          echo "diff_size=$(wc -c < pr_diff.txt)" >> $GITHUB_OUTPUT

      - name: Gemini Code Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          DIFF=$(cat pr_diff.txt)

          # diff가 너무 크면 앞부분만 사용 (Gemini 토큰 제한)
          if [ ${#DIFF} -gt 30000 ]; then
            DIFF="${DIFF:0:30000}
          ... (diff too large, truncated)"
          fi

          # Gemini API 요청
          RESPONSE=$(curl -s \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg diff "$DIFF" \
              '{
                contents: [{
                  parts: [{
                    text: ("아래는 GitHub PR의 코드 변경사항(diff)입니다. 코드 리뷰를 한국어로 작성해주세요.\n\n리뷰 항목:\n1. 🐛 버그 또는 잠재적 오류\n2. ⚡ 성능 개선 사항\n3. 🔒 보안 취약점\n4. 🧹 코드 품질 및 가독성\n5. ✅ 잘된 점\n\n각 항목에서 해당 없으면 생략해도 됩니다.\n\n```diff\n" + $diff + "\n```")
                  }]
                }]
              }'
            )"
          )

          # 응답에서 텍스트 추출
          REVIEW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "리뷰를 생성할 수 없습니다."')

          # PR 코멘트로 작성
          COMMENT="## 🤖 Gemini 코드 리뷰

          $REVIEW

          ---
          *Powered by Google Gemini*"

          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "$COMMENT"
